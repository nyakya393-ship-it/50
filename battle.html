<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

<h2>詳細</h2>

<div id="out"></div>

<script src="./script.js"></script>
<script>
const id = new URLSearchParams(location.search).get("id");
const b = getBattleById(id);

document.getElementById("out").innerHTML = `
  <div class="card ${b.result}">
    <h3>${b.stage}</h3>
    <div>${b.weapon}</div>
    <div>${b.sub} / ${b.special}</div>
    <div>${b.kills}K / ${b.deaths}D</div>
    <div>${b.paint}</div>
  </div>
`;
</script>

</body>
</html>
